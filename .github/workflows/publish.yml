name: Publish to npm

# Publishes when a version tag is pushed (npm rejects re-publishing an existing
# version, so publishing on every main merge would fail on non-release merges).
# Release flow:
#   npm version patch|minor|major   # bumps package.json + creates the tag
#   git push origin main --follow-tags
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: no registry-url here — that makes setup-node write a token-auth
      # .npmrc with a placeholder token, which preempts OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted publishing needs a newer npm than Node 22 bundles
      - run: npm install -g npm@latest

      - name: OIDC diagnostics
        run: |
          echo "npm version: $(npm --version)"
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC token endpoint: available"
          else
            echo "OIDC token endpoint: MISSING (id-token permission not effective)"
          fi

      - name: Verify tag matches package.json version
        run: |
          pkg="v$(npm pkg get version | tr -d '"')"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $pkg" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm test
      - run: npm run build

      # With a trusted publisher configured on npmjs.com, OIDC authenticates this
      # (no token needed). To use a classic token instead: add registry-url back
      # to setup-node, add the NPM_TOKEN repo secret, and uncomment the env block.
      - run: npm publish --loglevel http
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dump OIDC-related npm log lines on failure
        if: failure()
        run: |
          for f in /home/runner/.npm/_logs/*.log; do
            echo "=== $f"
            grep -inE "oidc|openid|id_token|audience|exchange|trusted|web-auth|fetch.*registry" "$f" | head -50 || true
          done
